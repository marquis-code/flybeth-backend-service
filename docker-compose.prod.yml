services:
  reverse-proxy:
    image: traefik:v3.6
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.clozaresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.clozaresolver.acme.email=hello@getcloza.com"
      - "--certificatesresolvers.clozaresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - cloza-net
    labels:
      - "traefik.enable=true"
      # HTTP-to-HTTPS Redirect
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/var/lib/redis/data
    networks:
      - cloza-net

  api:
    image: "ghcr.io/viyn-labs/cloza-backend:main"
    restart: unless-stopped
    depends_on: [reverse-proxy, redis]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - cloza-net
    labels:
      - "traefik.enable=true"
      # CORS middleware
      - "traefik.http.middlewares.corsMiddleware.headers.accesscontrolallowheaders=X-Requested-With, Content-Type, Content-Length, Authorization, Accept"
      - "traefik.http.middlewares.corsMiddleware.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.corsMiddleware.headers.accesscontrolallowmethods=GET, POST, PATCH, DELETE, OPTIONS"
      - "traefik.http.middlewares.corsMiddleware.headers.accesscontrolmaxage=120"
      # HTTPS router
      - "traefik.http.routers.api.rule=Host(`api.getcloza.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=clozaresolver"
      - "traefik.http.routers.api.middlewares=corsMiddleware"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

networks:
  cloza-net:

volumes:
  redis_data:
