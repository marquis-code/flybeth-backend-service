version: '3.8'

services:
  reverse-proxy:
    image: traefik:v2.11
    restart: always
    command:
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=hello@flybeth.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - DOCKER_API_VERSION=1.41
    networks:
      - flybeth-net

  backend:
    image: ghcr.io/marquis-code/flybeth-backend-service-backend:main
    restart: unless-stopped
    env_file:
      - ./.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.flybeth.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
    depends_on:
      - redis
      - mongodb
    networks:
      - flybeth-net

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - flybeth-net

  mongodb:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - flybeth-net

networks:
  flybeth-net:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
